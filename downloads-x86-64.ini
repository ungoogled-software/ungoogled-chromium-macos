# x86-64 (Intel) specific dependencies not included in the main Chromium source archive

# Pre-built LLVM toolchain for convenience
[llvm]
version = 22.1.0
url = https://github.com/implicitfield/llvm-macos-buildbot/releases/download/%(version)s-x86-64/clang+llvm-%(version)s-x86-64-apple-darwin24.0.tar.xz
download_filename = clang+llvm-%(version)s-x86-64-apple-darwin24.0.tar.xz
strip_leading_dirs = clang+llvm-%(version)s-x86-64-apple-darwin24.0
sha512 = 99ed71801934a9a64df976663377958ec3649a1bd322303251e4ca3e2965180c88142f9eae9dabd1192d0886f9076a2cc4966bc558868e782e95d033907bb7bc
output_path = third_party/llvm-build/Release+Asserts

[nodejs]
version = 24.12.0
url = https://nodejs.org/dist/v%(version)s/node-v%(version)s-darwin-x64.tar.xz
download_filename = node-v%(version)s-darwin-x64.tar.xz
strip_leading_dirs = node-v%(version)s-darwin-x64
sha512 = 3c1d16659764852555b0e23063e75c2fe64b7423d817093c5215a712ef6e16869279d78ccc85ed98d45694c333ad941c6fff289337ed6af869b18880972d0998
output_path = third_party/node/mac/node-darwin-x64

[rust]
version = 2026-01-30
url = https://static.rust-lang.org/dist/%(version)s/rust-nightly-x86_64-apple-darwin.tar.xz
download_filename = rust-nightly-%(version)s-x86_64-apple-darwin.tar.xz
output_path = third_party/rust-toolchain
strip_leading_dirs = rust-nightly-x86_64-apple-darwin
